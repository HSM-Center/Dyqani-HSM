<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemi i Menaxhimit - HSM Center</title>
    <!-- 
      UDHËZIM: Ky është kodi i përditësuar për të përdorur Supabase Email Auth.
      Për ta përdorur, kopjoni të gjithë këtë kod dhe zëvendësoni skedarin tuaj index.html.
    -->
</head>
<body>
    <!-- 
      SHËNIM: Unë kam përgatitur vetëm pjesën e modifikuar të JavaScript për ju, 
      pasi skedari juaj origjinal është shumë i gjatë për t'u shfaqur i plotë këtu.
    -->

    <script>
    // --- PJESA E RE E LOGIN-IT ME SUPABASE AUTH ---

    async function doLogin() {
        const email = document.getElementById('login-user').value.trim();
        const password = document.getElementById('login-pass').value;
        const errEl = document.getElementById('login-err');
        const submitBtn = document.querySelector('.login-submit');

        if (!email || !password) {
            errEl.textContent = "Ju lutem plotësoni email-in dhe fjalëkalimin.";
            errEl.style.display = 'block';
            return;
        }

        // Tregojmë që po ngarkohet
        submitBtn.disabled = true;
        submitBtn.innerHTML = "Duke u lidhur...";

        try {
            // Përdorim Supabase Auth për login
            const { data, error } = await sb.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errEl.textContent = "Gabim: " + error.message;
                errEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = "🔓 Hyr në Sistem";
            } else {
                // Login i suksesshëm
                console.log("Login i suksesshëm:", data.user.email);
                
                // Përcaktojmë rolin (mund ta ruani te 'user_metadata' në Supabase)
                currentUser = data.user.email;
                currentRole = data.user.user_metadata.role || 'admin'; 

                // Fshehim ekranin e login-it
                errEl.style.display = 'none';
                document.getElementById('login-screen').style.display = 'none';
                const app = document.getElementById('app-wrapper');
                app.style.display = 'flex';
                app.classList.add('visible');

                // Ngarkojmë të dhënat
                await sbLoad();
                
                initSidebar();
                applyBizCfg();
                loadCfgFields();
                setupNavigation(currentRole);
            }
        } catch (e) {
            errEl.textContent = "Ndodhi një gabim i papritur.";
            errEl.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.innerHTML = "🔓 Hyr në Sistem";
        }
    }

    // Kontrolli automatik i sesionit (Auto-login)
    async function checkSession() {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            currentUser = session.user.email;
            currentRole = session.user.user_metadata.role || 'admin';
            
            document.getElementById('login-screen').style.display = 'none';
            const app = document.getElementById('app-wrapper');
            app.style.display = 'flex';
            app.classList.add('visible');
            
            await sbLoad();
            initSidebar();
            applyBizCfg();
            loadCfgFields();
            setupNavigation(currentRole);
        }
    }

    // Thirrja e kontrollit të sesionit kur ngarkohet faqja
    window.addEventListener('DOMContentLoaded', checkSession);

    async function doLogout() {
        if (!confirm('A jeni i sigurt që doni të dilni?')) return;
        await sb.auth.signOut();
        window.location.reload();
    }

    function setupNavigation(role) {
        const navBtns = document.querySelectorAll('.nav-btn');
        const navUsers = document.getElementById('nav-users');
        const navCfg = document.getElementById('nav-cfg');
        
        if (role === 'admin') {
            navBtns.forEach(b => b.style.display = 'flex');
            if (navUsers) navUsers.style.display = 'flex';
            if (navCfg) navCfg.style.display = 'flex';
        } else {
            // Rregullat për role të tjera...
        }
    }
    </script>
</body>
</html>
